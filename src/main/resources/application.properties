# =============================================
# LinkSnip - URL Shortener Service
# =============================================

server.port=8080

# ----- H2 Database (default - for local testing) -----
spring.datasource.url=jdbc:h2:mem:linksnip
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ----- MySQL (uncomment for production) -----
# spring.datasource.url=jdbc:mysql://localhost:3306/linksnip?useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_password

# ----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ----- Application -----
app.base-url=http://localhost:8080
app.default-expiry-days=30
